name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # خطوات التأكد من صلاحيات ملف gradlew
    - name: Check gradlew file
      run: ls -la gradlew

    - name: Fix gradlew permissions and line endings
      run: |
        # نمنع Git من تغيير نهايات الأسطر تلقائيًا
        git config --global core.autocrlf false
        # نضبط صلاحية التنفيذ للملف
        chmod +x gradlew
        # نتأكد من نهايات الأسطر بصيغة Linux (LF)
        dos2unix gradlew || sed -i 's/\r$//' gradlew

    - name: Build APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
